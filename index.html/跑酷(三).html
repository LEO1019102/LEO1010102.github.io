<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON RUSH 2026: DOOMSDAY CHASE</title>
    <style>
        body { margin: 0; background: #050510; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #container { position: relative; width: 800px; height: 400px; }
        canvas { background: #0a0a1a; border: 3px solid #00f2ff; box-shadow: 0 0 25px #00f2ff55; border-radius: 12px; transition: background 1s; }
        .ui { position: absolute; top: 15px; left: 20px; pointer-events: none; z-index: 50; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 12px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn { background: #111; border: 2px solid #00f2ff; padding: 12px 24px; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }
        .bar-container { width: 220px; height: 12px; background: #222; border: 1px solid #444; margin-top: 5px; border-radius: 6px; overflow: hidden; }
        #energy-fill { width: 0%; height: 100%; background: #f1c40f; box-shadow: 0 0 10px #f1c40f; transition: width 0.1s; }
        #boss-alert { color: #ff4d4d; font-weight: bold; display: none; animation: blink 0.5s infinite; font-size: 14px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="container">
        <div class="ui">
            <div style="font-size: 22px; color: #00f2ff; font-weight: bold;">DISTANCE: <span id="dist">0</span>m / <span id="target">2000</span>m</div>
            <div id="boss-alert">⚠️ WARNING: DOOMSDAY LASER DETECTED! ⚠️</div>
            <div style="font-size: 13px; color: #f1c40f; margin-top:10px;">DASH ULTIMATE (X)</div>
            <div class="bar-container"><div id="energy-fill"></div></div>
        </div>
        <div id="overlay">
            <h1 style="color:#00f2ff; font-size: 42px; margin:0; text-shadow: 0 0 20px #00f2ff;">NEON RUSH 2026</h1>
            <p style="color:#bdc3c7;">[Space] Jump / Double Jump | [X] Dash</p>
            <div class="btn-group">
                <button class="btn" onclick="start('easy')">EASY (2000m)</button>
                <button class="btn" onclick="start('normal')">NORMAL (3000m)</button>
                <button class="btn" onclick="start('hard')">HARD (4000m)</button>
                <button class="btn" onclick="start('demon')">DEMON (5000m)</button>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
        const distEl = document.getElementById("dist"), targetEl = document.getElementById("target");
        const energyFill = document.getElementById("energy-fill"), overlay = document.getElementById("overlay"), bossAlert = document.getElementById("boss-alert");

        let audioCtx, gameRunning = false, distance = 0, targetDist = 2000, energy = 0;
        let player, obstacles, fliers, items, gameSpeed = 7, bossX = -500;
        let isDashing = false, dashTimer = 0, gravity = 0.75;

        function playSfx(f, d, t='sine', v=0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if(f === 150) o.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + d);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function start(diff) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(diff === 'easy') targetDist = 2000;
            else if(diff === 'normal') targetDist = 3000;
            else if(diff === 'hard') targetDist = 4000;
            else targetDist = 5000;

            targetEl.innerText = targetDist;
            overlay.style.display = "none";
            bossAlert.style.display = "none";
            canvas.style.background = "#0a0a1a";
            
            distance = 0; energy = 0; gameSpeed = 7; bossX = -500; gravity = 0.75;
            player = { x: 150, y: 300, w: 40, h: 40, dy: 0, jumpPower: -13, jumps: 0 };
            obstacles = []; fliers = []; items = [];
            gameRunning = true;
            requestAnimationFrame(update);
        }

        window.onkeydown = (e) => {
            if(!gameRunning) return;
            if(e.code === "Space" && player.jumps < 2) {
                player.dy = player.jumpPower;
                player.jumps++;
                playSfx(150, 0.2);
            }
            if(e.code === "KeyX" && energy >= 100 && !isDashing) {
                isDashing = true; energy = 0; dashTimer = 100;
                playSfx(80, 0.8, 'sawtooth', 0.2);
            }
        };

        function update(time) {
            if(!gameRunning) return;
            ctx.clearRect(0, 0, 800, 400);

            if(distance > targetDist / 2) {
                bossAlert.style.display = "block";
                canvas.style.background = "#2a0a0a";
                gravity = 0.45;
                bossX += (isDashing ? 0.5 : 1.8);
                
                ctx.fillStyle = "rgba(255, 0, 0, 0.6)";
                ctx.shadowBlur = 30; ctx.shadowColor = "red";
                ctx.fillRect(bossX, 0, 50, 400);
                ctx.shadowBlur = 0;

                if(bossX + 50 > player.x) gameOver("LASER OVERTAKE!");
            }

            if(!isDashing) {
                player.dy += gravity;
                player.y += player.dy;
                if(player.y > 300) { player.y = 300; player.dy = 0; player.jumps = 0; }
            } else {
                dashTimer--;
                player.dy = 0;
                if(dashTimer <= 0) isDashing = false;
            }

            ctx.fillStyle = isDashing ? "#f1c40f" : "#00f2ff";
            ctx.shadowBlur = isDashing ? 30 : 10; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;

            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, 340); ctx.lineTo(800, 340); ctx.stroke();

            if(Math.random() < 0.015) obstacles.push({x: 800, y: 310, w: 30, h: 30});
            obstacles.forEach((o, i) => {
                o.x -= isDashing ? gameSpeed * 1.5 : gameSpeed;
                ctx.fillStyle = "#ff4d4d"; ctx.fillRect(o.x, o.y, o.w, o.h);
                if(checkCollision(player, o)) {
                    if(isDashing) { obstacles.splice(i, 1); playSfx(200, 0.1, 'square'); } else gameOver("CRASHED!");
                }
                if(o.x < -50) obstacles.splice(i, 1);
            });

            if(Math.random() < 0.01) fliers.push({x: 800, y: 150 + Math.random()*100, w: 40, h: 20});
            fliers.forEach((f, i) => {
                f.x -= isDashing ? gameSpeed * 1.8 : gameSpeed * 1.2;
                ctx.fillStyle = "#a29bfe"; ctx.fillRect(f.x, f.y, f.w, f.h);
                if(checkCollision(player, f)) {
                    if(isDashing) { fliers.splice(i, 1); playSfx(200, 0.1, 'square'); } else gameOver("INTERCEPTED!");
                }
                if(f.x < -50) fliers.splice(i, 1);
            });

            if(Math.random() < 0.02) items.push({x: 800, y: 150 + Math.random()*150, w: 15, h: 15});
            items.forEach((it, i) => {
                it.x -= gameSpeed;
                ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(it.x, it.y, 8, 0, Math.PI*2); ctx.fill();
                if(Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 40) {
                    energy = Math.min(100, energy + 20); items.splice(i, 1);
                    playSfx(880, 0.1, 'sine');
                }
            });

            distance += Math.floor(gameSpeed / 4);
            gameSpeed += 0.0004;
            distEl.innerText = distance;
            energyFill.style.width = energy + "%";

            if(distance >= targetDist) victory();

            requestAnimationFrame(update);
        }

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        function victory() {
            gameRunning = false;
            overlay.style.display = "flex";
            overlay.innerHTML = `<h1 style="color:#f1c40f; font-size:48px;">YOU WIN!</h1><p>Reached ${targetDist}m</p><button class="btn" onclick="location.reload()">MENU</button>`;
        }

        function gameOver(reason) {
            gameRunning = false;
            playSfx(100, 0.5, 'sawtooth');
            overlay.style.display = "flex";
            overlay.innerHTML = `<h1 style="color:#ff4d4d; font-size:40px;">MISSION FAILED</h1><p>${reason}</p><p>Score: ${distance}m</p><button class="btn" onclick="location.reload()">RETRY</button>`;
        }
    </script>
</body>
</html>
