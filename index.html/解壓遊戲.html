<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100連發！究極泡泡紙</title>
    <style>
        body { 
            background: #08080a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; overflow: hidden; touch-action: none;
            font-family: '微軟正黑體', sans-serif;
        }
        /* 10x10 網格配置 */
        .container {
            display: grid; 
            grid-template-columns: repeat(10, 1fr); /* 10欄 */
            gap: 8px; 
            padding: 15px; 
            background: #121218; 
            border-radius: 20px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.9), inset 0 0 10px rgba(255,255,255,0.05);
            border: 1px solid #1f1f2e;
            max-width: 95vw; /* 防止超出手機邊界 */
        }
        .bubble {
            width: clamp(25px, 8vw, 45px); /* 自動縮放大小 */
            height: clamp(25px, 8vw, 45px);
            border-radius: 50%; cursor: pointer;
            background: radial-gradient(circle at 30% 30%, #2a2a4e 0%, #050508 80%);
            box-shadow: 4px 4px 8px #020204, -2px -2px 6px #1a1a2e;
            position: relative; transition: transform 0.1s;
        }
        /* 內部發光核心 */
        .bubble::after {
            content: ''; position: absolute; top: 20%; left: 20%; width: 60%; height: 60%;
            border-radius: 50%; background: var(--c); opacity: 0.3; filter: blur(4px);
        }
        /* 點破狀態 */
        .bubble.popped {
            transform: scale(0.88);
            background: #020205;
            box-shadow: inset 4px 4px 8px #000, inset -1px -1px 4px #1a1a2e;
        }
        .bubble.popped::after { opacity: 0.05; filter: blur(2px); }
        
        .reset-bar {
            margin-top: 25px; display: flex; align-items: center; gap: 20px;
        }
        .counter { color: #4a4a8a; font-family: monospace; font-size: 1.2rem; }
        .reset { 
            background: #1a1a2e; border: 1px solid #333; color: #888; 
            padding: 8px 20px; border-radius: 10px; cursor: pointer; 
        }
        .reset:active { background: #333; }
    </style>
</head>
<body>
    <div class="container" id="grid"></div>
    <div class="reset-bar">
        <div class="counter">POPPED: <span id="count">0</span>/100</div>
        <button class="reset" onclick="reset()">RESET</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const countDisplay = document.getElementById('count');
        const colors = ['#00f2ff', '#7000ff', '#ff0070', '#00ff88', '#f1c40f'];
        let poppedCount = 0;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 高級物理音效：三層疊加
        function playPop() {
            const now = audioCtx.currentTime;
            const master = audioCtx.createGain();
            master.gain.setValueAtTime(0.4, now);

            // 1. 沉重底音 (Thump)
            const low = audioCtx.createOscillator();
            const lg = audioCtx.createGain();
            low.type = 'sine';
            low.frequency.setValueAtTime(150, now);
            low.frequency.exponentialRampToValueAtTime(40, now + 0.12);
            lg.gain.setValueAtTime(1, now);
            lg.gain.linearRampToValueAtTime(0, now + 0.12);
            low.connect(lg); lg.connect(master);

            // 2. 脆裂高音 (Snap)
            const high = audioCtx.createOscillator();
            const hg = audioCtx.createGain();
            high.type = 'triangle';
            high.frequency.setValueAtTime(900 + Math.random()*200, now); // 隨機音調更真實
            high.frequency.exponentialRampToValueAtTime(1200, now + 0.03);
            hg.gain.setValueAtTime(0.2, now);
            hg.gain.linearRampToValueAtTime(0, now + 0.03);
            high.connect(hg); hg.connect(master);

            master.connect(audioCtx.destination);
            low.start(); low.stop(now + 0.12);
            high.start(); high.stop(now + 0.03);
        }

        function create() {
            poppedCount = 0;
            countDisplay.innerText = poppedCount;
            grid.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                // 讓每一排顏色稍微規律但帶點隨機
                b.style.setProperty('--c', colors[Math.floor(i/10) % colors.length]);
                
                const trigger = (e) => {
                    e.preventDefault();
                    if (!b.classList.contains('popped')) {
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        b.classList.add('popped');
                        poppedCount++;
                        countDisplay.innerText = poppedCount;
                        playPop();
                        if (navigator.vibrate) navigator.vibrate(15);
                    }
                };
                
                b.onpointerdown = trigger;
                grid.appendChild(b);
            }
        }

        function reset() { create(); }
        create();
    </script>
</body>
</html>
